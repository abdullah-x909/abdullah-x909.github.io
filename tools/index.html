<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MarkFlow v2 — Power Markdown Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="window._katexReady=true; if(window._pendingRender) window._pendingRender()"></script>
<!-- marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<!-- marked-footnote -->
<script src="https://cdn.jsdelivr.net/npm/marked-footnote@1.1.3/dist/index.umd.min.js"></script>
<!-- highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
<!-- FileSaver + html-docx-js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
<style>
:root{
  --bg:#0d0d12;--surface:#13131a;--panel:#18181f;--panel2:#1e1e28;
  --border:#252530;--border2:#2e2e3d;
  --accent:#a78bfa;--aglow:rgba(167,139,250,.15);
  --a2:#34d399;--a3:#f472b6;--a4:#fbbf24;
  --text:#e2e2ee;--text2:#9090aa;--muted:#525268;
  --mono:'JetBrains Mono',monospace;--ui:'Outfit',sans-serif;
  --tbh:50px;--sbh:26px;--sbw:250px;
}
body.light{
  --bg:#f8f8fc;--surface:#ffffff;--panel:#f2f2f8;--panel2:#eaeaf2;
  --border:#dddde8;--border2:#c8c8d8;
  --accent:#7c3aed;--aglow:rgba(124,58,237,.1);
  --a2:#059669;--a3:#db2777;--a4:#d97706;
  --text:#1a1a2e;--text2:#4a4a6a;--muted:#8888a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--ui);background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .2s,color .2s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── TOOLBAR */
#tb{height:var(--tbh);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:1px;flex-shrink:0;z-index:20;
  overflow-x:auto;overflow-y:visible;}
#tb::-webkit-scrollbar{height:0;}
#tb-inner{display:flex;align-items:center;gap:1px;min-width:max-content;overflow:visible;}
.logo{font-size:14px;font-weight:800;color:var(--accent);margin-right:10px;flex-shrink:0;
  display:flex;align-items:center;gap:5px;letter-spacing:-.3px;}
.logo-v{font-size:9px;background:var(--accent);color:var(--bg);padding:1px 5px;
  border-radius:4px;font-weight:700;margin-left:2px;}
.sep{width:1px;height:20px;background:var(--border2);margin:0 5px;flex-shrink:0;}
.b{width:30px;height:30px;border:none;background:transparent;color:var(--text2);
  cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-family:var(--mono);font-weight:500;transition:background .12s,color .12s;
  position:static;flex-shrink:0;}
.b:hover{background:var(--panel2);color:var(--text);}
.b.on{background:var(--aglow);color:var(--accent);}
.b svg{width:14px;height:14px;pointer-events:none;}
.tbr{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.xb{height:27px;padding:0 11px;border:none;border-radius:6px;cursor:pointer;
  font-family:var(--ui);font-size:11px;font-weight:700;
  display:flex;align-items:center;gap:4px;transition:opacity .15s;flex-shrink:0;}
.xb:hover{opacity:.82;}
.xb:active{transform:scale(.97);}
.xb svg{width:11px;height:11px;}
.xb-w{background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;}
.xb-p{background:linear-gradient(135deg,#dc2626,#f97316);color:#fff;}
.xb-h{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;}
.xb-m{background:linear-gradient(135deg,#059669,#10b981);color:#fff;}
.vg{display:flex;background:var(--panel);border-radius:7px;padding:2px;gap:1px;}
.vb{height:24px;padding:0 9px;border:none;background:transparent;color:var(--muted);
  font-family:var(--ui);font-size:11px;font-weight:600;cursor:pointer;border-radius:5px;
  transition:all .12s;}
.vb.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* ── TOOLBAR 2 */
#tb2{height:33px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:5px;flex-shrink:0;overflow-x:auto;}
#tb2::-webkit-scrollbar{height:0;}
.t2{height:21px;padding:0 8px;border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);border-radius:5px;font-family:var(--ui);font-size:10px;font-weight:600;
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0;}
.t2:hover{border-color:var(--accent);color:var(--accent);}
.t2.on{border-color:var(--accent);background:var(--aglow);color:var(--accent);}
.t2sep{width:1px;height:14px;background:var(--border2);flex-shrink:0;}

/* ── FIND BAR */
#fb{background:var(--surface);border-bottom:1px solid var(--border);
  display:none;align-items:center;padding:5px 12px;gap:7px;flex-shrink:0;flex-wrap:wrap;}
#fb.open{display:flex;}
.fi{height:25px;padding:0 9px;background:var(--panel2);border:1px solid var(--border2);
  border-radius:5px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;min-width:150px;}
.fi:focus{border-color:var(--accent);}
.fc{font-size:11px;color:var(--muted);min-width:55px;}
.fb2{height:25px;padding:0 9px;background:var(--panel2);border:1px solid var(--border2);
  border-radius:5px;color:var(--text2);font-family:var(--ui);font-size:11px;cursor:pointer;transition:all .12s;}
.fb2:hover{border-color:var(--accent);color:var(--accent);}
.fb-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;}

/* ── LAYOUT */
#app{flex:1;display:flex;overflow:hidden;}

/* ── GLOBAL TOOLTIP */
#tip{position:fixed;z-index:9999;background:var(--panel2);border:1px solid var(--border2);
  color:var(--text);font-size:11px;font-family:var(--ui);white-space:nowrap;
  padding:4px 9px;border-radius:6px;pointer-events:none;opacity:0;
  transition:opacity .12s;box-shadow:0 2px 8px rgba(0,0,0,.35);}
#tip.show{opacity:1;}

/* ── SIDEBAR */
#sb-wrap{display:flex;flex-direction:row;flex-shrink:0;position:relative;align-items:stretch;}
#sb{width:var(--sbw);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:width .22s ease;overflow:hidden;}
#sb.hide{width:0;border-right:none;}
#sb-toggle{
  width:13px;background:var(--surface);
  border:1px solid var(--border);border-left:none;
  border-radius:0 6px 6px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:11px;transition:background .15s,color .15s;
  flex-shrink:0;padding:0;
}
#sb-toggle:hover{background:var(--panel2);color:var(--accent);}
#sb.hide+#sb-toggle{border-left:1px solid var(--border);border-radius:6px;}
#sb-toggle .arr{transition:transform .22s;display:block;line-height:1;user-select:none;}
.sbh{padding:9px 11px 7px;font-size:9px;font-weight:700;letter-spacing:1.3px;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.sbhb{display:flex;gap:3px;}
.sbi{width:20px;height:20px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .12s;}
.sbi:hover{background:var(--aglow);color:var(--accent);}
#fsrch{margin:6px 8px;padding:5px 9px;background:var(--panel);
  border:1px solid var(--border);border-radius:5px;color:var(--text);
  font-family:var(--ui);font-size:12px;outline:none;width:calc(100% - 16px);}
#fsrch:focus{border-color:var(--accent);}
.fl{flex:1;overflow-y:auto;padding:4px;}
.fi2{padding:7px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;
  gap:6px;font-size:12px;color:var(--text2);transition:all .12s;user-select:none;min-width:0;}
.fi2:hover{background:var(--panel2);color:var(--text);}
.fi2.on{background:var(--aglow);color:var(--accent);}
.fi2 svg{width:12px;height:12px;flex-shrink:0;}
.fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fd{background:none;border:none;color:transparent;cursor:pointer;font-size:12px;
  padding:0 2px;line-height:1;transition:color .12s;}
.fi2:hover .fd{color:var(--muted);}
.fd:hover{color:var(--a3) !important;}

/* TOC */
#tocp{border-top:1px solid var(--border);max-height:220px;overflow-y:auto;padding:5px 0;display:none;}
.toch{font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;padding:3px 11px 5px;}
.toci{display:block;padding:3px 11px;font-size:11px;color:var(--text2);cursor:pointer;
  transition:all .1s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toci:hover{color:var(--accent);border-left-color:var(--accent);}
.toci.l2{padding-left:20px;}
.toci.l3{padding-left:29px;}
.toci.l4{padding-left:38px;}

/* ── EDITOR */
#work{flex:1;display:flex;overflow:hidden;}
#ep{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative;min-width:80px;}
#lns{position:absolute;left:0;top:0;bottom:0;width:40px;background:var(--surface);
  border-right:1px solid var(--border);font-family:var(--mono);font-size:12px;line-height:1.75;
  color:var(--muted);text-align:right;padding-top:32px;padding-right:8px;
  pointer-events:none;overflow:hidden;user-select:none;z-index:1;display:none;}
.ln{display:block;}
#ed{flex:1;width:100%;background:transparent;color:var(--text);
  font-family:var(--mono);font-size:14px;line-height:1.75;
  border:none;outline:none;resize:none;padding:32px 36px 32px 36px;
  tab-size:2;caret-color:var(--accent);overflow-y:auto;transition:background .2s;}
#ed::placeholder{color:var(--muted);}
body.nowrap #ed{white-space:pre;overflow-x:auto;}
.db{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
.db:hover,.db.drag{background:var(--accent);}

/* ── PREVIEW */
#pp{flex:1;background:var(--panel);overflow-y:auto;padding:36px 44px;
  border-left:1px solid var(--border);min-width:80px;}
#pv{max-width:760px;margin:0 auto;font-size:15.5px;line-height:1.85;color:var(--text);}
#pv h1{font-family:var(--ui);font-size:2em;font-weight:800;margin:.1em 0 .5em;
  border-bottom:2px solid var(--accent);padding-bottom:.3em;}
#pv h2{font-family:var(--ui);font-size:1.45em;font-weight:700;margin:1.5em 0 .4em;}
#pv h3{font-family:var(--ui);font-size:1.15em;font-weight:700;margin:1.2em 0 .3em;color:var(--text2);}
#pv h4,#pv h5,#pv h6{font-family:var(--ui);font-weight:700;margin:.9em 0 .25em;color:var(--muted);}
#pv p{margin:.6em 0 .8em;}
#pv a{color:var(--accent);text-decoration:none;}
#pv a:hover{text-decoration:underline;}
#pv strong{font-weight:700;}
#pv em{font-style:italic;}
#pv del{text-decoration:line-through;color:var(--muted);}
#pv mark{background:rgba(251,191,36,.28);color:var(--text);border-radius:2px;padding:0 2px;}
#pv code{font-family:var(--mono);font-size:.85em;background:var(--panel2);
  color:var(--a2);padding:2px 6px;border-radius:4px;}
#pv pre{background:var(--bg);border:1px solid var(--border2);border-left:3px solid var(--accent);
  border-radius:8px;padding:16px 20px;overflow-x:auto;margin:1em 0;position:relative;}
#pv pre code{background:none;padding:0;color:inherit;font-size:.87em;}
.cc{position:absolute;top:7px;right:7px;background:var(--panel2);border:1px solid var(--border2);
  color:var(--muted);border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;
  font-family:var(--ui);transition:all .12s;opacity:0;}
#pv pre:hover .cc{opacity:1;}
.cc:hover{color:var(--accent);border-color:var(--accent);}
#pv blockquote{border-left:3px solid var(--accent);padding:.5em 1em;margin:1em 0;
  background:var(--aglow);border-radius:0 6px 6px 0;color:var(--text2);font-style:italic;}
#pv ul,#pv ol{padding-left:1.8em;margin:.6em 0;}
#pv li{margin:.3em 0;}
#pv table{border-collapse:collapse;width:100%;margin:1em 0;}
#pv th{background:var(--aglow);color:var(--accent);padding:8px 12px;text-align:left;
  border:1px solid var(--border2);font-family:var(--ui);font-weight:700;}
#pv td{padding:8px 12px;border:1px solid var(--border2);}
#pv tr:hover td{background:rgba(167,139,250,.04);}
#pv hr{border:none;border-top:1px solid var(--border2);margin:1.5em 0;}
#pv img{max-width:100%;border-radius:8px;}
#pv input[type="checkbox"]{margin-right:6px;}
#pv .katex-display{overflow-x:auto;padding:.5em 0;}
#pv .mermaid{background:var(--panel2);border-radius:8px;padding:20px;text-align:center;
  margin:1em 0;border:1px solid var(--border2);}
#pv .footnotes{border-top:1px solid var(--border2);margin-top:2em;padding-top:1em;
  font-size:.88em;color:var(--text2);}
body.reading #pv{max-width:680px;font-size:17px;line-height:2;}

/* ── STATUS */
#stb{height:var(--sbh);background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:14px;
  font-size:10.5px;color:var(--muted);font-family:var(--mono);flex-shrink:0;}
.st{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.st b{color:var(--text2);}
.std{width:5px;height:5px;border-radius:50%;background:var(--a2);}
.str{margin-left:auto;display:flex;gap:12px;align-items:center;}
#stm{color:var(--accent);font-weight:600;font-size:10px;}
#sts{font-size:10px;}

/* ── WORD COUNT */
#wcp{position:fixed;bottom:36px;right:12px;background:var(--surface);
  border:1px solid var(--border2);border-radius:10px;padding:12px 16px;z-index:50;
  box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:175px;
  transform:translateY(4px) scale(.97);opacity:0;pointer-events:none;transition:all .17s;}
#wcp.open{opacity:1;pointer-events:all;transform:none;}
.wr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;
  border-bottom:1px solid var(--border);}
.wr:last-child{border:none;}
.wl{color:var(--muted);}
.wv{color:var(--text);font-family:var(--mono);font-weight:500;}

/* ── MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
  justify-content:center;z-index:999;opacity:0;pointer-events:none;
  transition:opacity .2s;backdrop-filter:blur(6px);}
.ov.open{opacity:1;pointer-events:all;}
.mo{background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  padding:22px 26px;min-width:340px;transform:translateY(8px);transition:transform .2s;}
.ov.open .mo{transform:translateY(0);}
.mo h3{font-size:15px;font-weight:700;margin-bottom:13px;}
.mi{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;
  padding:8px 11px;color:var(--text);font-family:var(--ui);font-size:13px;outline:none;transition:border .15s;}
.mi:focus{border-color:var(--accent);}
.ma{margin-top:14px;display:flex;gap:8px;justify-content:flex-end;}
.mc{padding:6px 14px;background:var(--panel);border:1px solid var(--border2);
  border-radius:6px;color:var(--muted);font-family:var(--ui);font-size:12px;cursor:pointer;}
.mok{padding:6px 14px;background:linear-gradient(135deg,var(--accent),var(--a2));
  border:none;border-radius:6px;color:var(--bg);font-family:var(--ui);font-size:12px;font-weight:700;cursor:pointer;}
.scg{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;margin-top:6px;max-height:60vh;overflow-y:auto;}
.scr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;
  border-bottom:1px solid var(--border);}
.sck{font-family:var(--mono);font-size:10px;background:var(--panel2);
  padding:2px 6px;border-radius:4px;color:var(--accent);}
.scd{font-size:11px;color:var(--text2);}

/* ── EMOJI */
#emp{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:8px;display:none;flex-wrap:wrap;gap:2px;
  width:252px;max-height:190px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.4);}

/* ── TOAST */
#tst{position:fixed;bottom:38px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--panel2);border:1px solid var(--border2);border-radius:8px;
  padding:8px 16px;font-size:12px;color:var(--text);opacity:0;transition:all .22s;
  z-index:1000;pointer-events:none;}
#tst.show{opacity:1;transform:translateX(-50%) translateY(0);}
#tst.ok{border-color:var(--a2);}
#tst.err{border-color:var(--a3);}
#tst.info{border-color:var(--accent);}

/* ── VIEW HELPERS */
#work.edit-only #pp{display:none;}
#work.edit-only .db{display:none;}
#work.prev-only #ep{display:none;}
#work.prev-only .db{display:none;}
#work.prev-only #pp{padding:48px 10%;}
body.focus #tb2{display:none;}
body.focus #sb-wrap{width:0;overflow:hidden;}
body.focus #ed{padding:48px 80px;font-size:16px;}
body.focus #stb{display:none;}
</style>
</head>
<body>
<!-- GLOBAL TOOLTIP -->
<div id="tip"></div>

<!-- TOOLBAR -->
<div id="tb"><div id="tb-inner">
  <div class="logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 8h10M7 12h6M7 16h8"/></svg>
    MarkFlow <span class="logo-v">v2.0.3</span>
  </div>
  <div class="sep"></div>
  <button class="b" data-t="Bold Ctrl+B" onclick="wrap('**','**')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"/><path d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/></svg></button>
  <button class="b" data-t="Italic Ctrl+I" onclick="wrap('*','*')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
  <button class="b" data-t="Strikethrough" onclick="wrap('~~','~~')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4H9a3 3 0 00-3 3 3 3 0 003 3h6a3 3 0 010 6H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
  <button class="b" data-t="Highlight ==text==" onclick="wrap('==','==')">Hl</button>
  <button class="b" data-t="Superscript" onclick="wrap('^','^')">x²</button>
  <button class="b" data-t="Subscript" onclick="wrap('~','~')">x₂</button>
  <button class="b" data-t="Inline code Ctrl+`" onclick="wrap('`','`')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
  <div class="sep"></div>
  <button class="b" data-t="H1" onclick="pfx('# ')"><b style="font-size:13px">H1</b></button>
  <button class="b" data-t="H2" onclick="pfx('## ')"><b style="font-size:11px">H2</b></button>

<script>
/* ════ MARKED SETUP ═════════════════════════════ */
marked.use(markedFootnote());
marked.use({
  gfm:true, breaks:true,
  extensions:[{
    name:'mark', level:'inline',
    start(s){ return s.indexOf('=='); },
    tokenizer(s){ const m=s.match(/^==([^=\n]+)==/); if(m) return {type:'mark',raw:m[0],text:m[1]}; },
    renderer(t){ return `<mark>${t.text}</mark>`; }
  }],
  renderer:(()=>{
    const r=new marked.Renderer();
    r.code=(code,lang)=>{
      if(lang==='mermaid') return `<div class="mermaid">${code}</div>`;
      const hl=lang&&hljs.getLanguage(lang)
        ? hljs.highlight(code,{language:lang,ignoreIllegals:true}).value
        : hljs.highlightAuto(code).value;
      return `<pre><button class="cc" onclick="cpCode(this)">copy</button><code class="hljs">${hl}</code></pre>`;
    };
    r.heading=(text,level)=>{
      const id='h-'+text.toLowerCase().replace(/[^\w]+/g,'-');
      return `<h${level} id="${id}">${text}</h${level}>`;
    };
    return r;
  })()
});

/* ════ STATE ════════════════════════════════════ */
let files=JSON.parse(localStorage.getItem('mf2')||'null')||[{id:1,name:'README.md',content:DEMO()}];
let aid=files[0].id, svt=null, syncon=false, lnon=false, fms=[], fmx=0, fnc=0;
const ed=document.getElementById('ed');
const pv=document.getElementById('pv');
const lns=document.getElementById('lns');

/* ════ RENDER ═══════════════════════════════════ */
let rt=null;
function render(){ clearTimeout(rt); rt=setTimeout(_render,80); }
function _render(){
  const md=ed.value;
  pv.innerHTML=marked.parse(md);
  function doKatex(){
    renderMathInElement(pv,{
      delimiters:[
        {left:'$$',right:'$$',display:true},
        {left:'$', right:'$', display:false},
        {left:'\\[',right:'\\]',display:true},
        {left:'\\(',right:'\\)',display:false}
      ],
      throwOnError:false
    });
  }
  if(window._katexReady) doKatex();
  else window._pendingRender=doKatex;
  mermaid.run({nodes:pv.querySelectorAll('.mermaid')});
  updateStat(md); updateTOC(); updateLN();
  schedSave();
}
ed.addEventListener('input',render);

/* ════ LINE NUMBERS ═════════════════════════════ */
function updateLN(){
  if(!lnon) return;
  lns.innerHTML=ed.value.split('\n').map((_,i)=>`<span class="ln">${i+1}</span>`).join('');
}
function toggleLN(){
  lnon=!lnon;
  lns.style.display=lnon?'block':'none';
  ed.style.paddingLeft=lnon?'50px':'36px';
  document.getElementById('blns').classList.toggle('on',lnon);
  updateLN();
}

/* ════ STATUS ═══════════════════════════════════ */
function updateStat(md){
  const t=md||ed.value;
  const w=t.trim()?t.trim().split(/\s+/).length:0;
  document.getElementById('stw').textContent=w;
  document.getElementById('stc').textContent=t.length;
  document.getElementById('stl').textContent=t.split('\n').length;
  document.getElementById('ww').textContent=w;
  document.getElementById('wc2').textContent=t.length;
  document.getElementById('wcn').textContent=t.replace(/\s/g,'').length;
  document.getElementById('wln').textContent=t.split('\n').length;
  document.getElementById('wpa').textContent=t.split(/\n\s*\n/).filter(Boolean).length;
  document.getElementById('wrt').textContent=Math.max(1,Math.ceil(w/200))+' min';
}
ed.addEventListener('keyup',cur); ed.addEventListener('click',cur);
function cur(){
  const v=ed.value.substring(0,ed.selectionStart);
  const ls=v.split('\n');
  document.getElementById('stln').textContent=ls.length;
  document.getElementById('stcl').textContent=ls[ls.length-1].length+1;
}

/* ════ SCROLL SYNC ══════════════════════════════ */
let syncLk=false;
ed.addEventListener('scroll',()=>{
  if(!syncon||syncLk) return;
  syncLk=true;
  const pct=ed.scrollTop/(ed.scrollHeight-ed.clientHeight);
  const pp=document.getElementById('pp');
  pp.scrollTop=pct*(pp.scrollHeight-pp.clientHeight);
  setTimeout(()=>syncLk=false,40);
});
function toggleSync(){
  syncon=!syncon;
  document.getElementById('bsnc').classList.toggle('on',syncon);
  toast(syncon?'Scroll sync ON':'Scroll sync OFF','info');
}

/* ════ TOC ══════════════════════════════════════ */
function updateTOC(){
  const tp=document.getElementById('tocp');
  if(tp.style.display==='none'||!tp.style.display) return;
  const ti=document.getElementById('toci');
  ti.innerHTML=[...pv.querySelectorAll('h1,h2,h3,h4')].map(h=>{
    const l=+h.tagName[1];
    return `<div class="toci l${l}" onclick="scrollH('${h.id}')">${h.textContent}</div>`;
  }).join('');
}
function scrollH(id){ const e=document.getElementById(id); if(e) e.scrollIntoView({behavior:'smooth'}); }
function toggleTOC(){
  const p=document.getElementById('tocp');
  const on=p.style.display!=='block';
  p.style.display=on?'block':'none';
  document.getElementById('btoc').classList.toggle('on',on);
  if(on) updateTOC();
}

/* ════ FILES ════════════════════════════════════ */
function savF(){ localStorage.setItem('mf2',JSON.stringify(files)); }
function schedSave(){
  clearTimeout(svt);
  const f=files.find(f=>f.id===aid);
  if(f) f.content=ed.value;
  const s=document.getElementById('sts');
  s.textContent='● saving…'; s.style.color='var(--a4)';
  svt=setTimeout(()=>{ savF(); s.textContent='✓ saved'; s.style.color='var(--a2)'; },700);
}
function renderFL(filter=''){
  const fl=document.getElementById('fl');
  fl.innerHTML='';
  files.filter(f=>f.name.toLowerCase().includes(filter.toLowerCase())).forEach(f=>{
    const el=document.createElement('div');
    el.className='fi2'+(f.id===aid?' on':'');
    el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="fn">${f.name}</span>${files.length>1?`<button class="fd" onclick="delF(event,${f.id})">✕</button>`:''}`;
    el.addEventListener('click',e=>{ if(!e.target.classList.contains('fd')) swF(f.id); });
    fl.appendChild(el);
  });
}
function filterFiles(){ renderFL(document.getElementById('fsrch').value); }
function swF(id){
  const cur=files.find(f=>f.id===aid); if(cur) cur.content=ed.value;
  aid=id;
  const f=files.find(f=>f.id===id);
  ed.value=f.content;
  document.getElementById('stf').textContent=f.name;
  render(); renderFL();
}
function newFile(){
  document.getElementById('nname').value='';
  openM('mnew');
  setTimeout(()=>document.getElementById('nname').focus(),100);
}
function confirmNew(){
  let n=document.getElementById('nname').value.trim()||'untitled.md';
  if(!n.endsWith('.md')) n+='.md';
  const cur=files.find(f=>f.id===aid); if(cur) cur.content=ed.value;
  const id=Date.now();
  files.push({id,name:n,content:`# ${n.replace('.md','')}\n\n`});
  aid=id; ed.value=files[files.length-1].content;
  document.getElementById('stf').textContent=n;
  savF(); render(); renderFL(); closeM('mnew');
}
function delF(e,id){
  e.stopPropagation(); files=files.filter(f=>f.id!==id);
  if(aid===id){ aid=files[files.length-1].id; const f=files.find(f=>f.id===aid); ed.value=f.content; document.getElementById('stf').textContent=f.name; render(); }
  savF(); renderFL();
}
function importFile(){ document.getElementById('iinp').click(); }
document.getElementById('iinp').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    const cur=files.find(f=>f.id===aid); if(cur) cur.content=ed.value;
    const id=Date.now();
    files.push({id,name:file.name,content:ev.target.result});
    aid=id; ed.value=files[files.length-1].content;
    document.getElementById('stf').textContent=file.name;
    savF(); render(); renderFL(); toast('Imported: '+file.name,'ok');
  };
  r.readAsText(file); e.target.value='';
});

/* ════ VIEW ═════════════════════════════════════ */
function setView(m){
  document.getElementById('work').className=m;
  document.getElementById('ve').classList.toggle('on',m==='edit-only');
  document.getElementById('vs').classList.toggle('on',m==='split');
  document.getElementById('vp').classList.toggle('on',m==='prev-only');
}

/* ════ TOOLBAR ACTIONS ══════════════════════════ */
function wrap(b,a){
  const s=ed.selectionStart,e=ed.selectionEnd,sel=ed.value.substring(s,e);
  ed.setRangeText(b+(sel||'text')+a,s,e,'select');
  ed.focus(); render();
}
function pfx(p){
  const s=ed.selectionStart,ls=ed.value.lastIndexOf('\n',s-1)+1;
  ed.setRangeText(p,ls,ls,'end'); ed.focus(); render();
}
function ins(t){ ed.setRangeText(t,ed.selectionStart,ed.selectionStart,'end'); ed.focus(); render(); }
function codeBlock(){ ins('\n```\n'+(ed.value.substring(ed.selectionStart,ed.selectionEnd)||'// code here')+'\n```\n'); }
function mathBlock(){ ins('\n$$\n\\int_0^\\infty e^{-x}\\,dx = 1\n$$\n'); }
function mermaidBlock(){ ins('\n```mermaid\ngraph TD\n  A[Start] --> B{Choice}\n  B -- Yes --> C[OK]\n  B -- No --> D[No]\n```\n'); }
function insertLink(){ const s=ed.selectionStart,e=ed.selectionEnd,sel=ed.value.substring(s,e); ed.setRangeText(`[${sel||'link'}](https://url.com)`,s,e,'end'); ed.focus(); render(); }
function insertImage(){ ins('![alt](https://url.com/image.png)'); }
function insertTable(){ ins('\n| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| A | B | C |\n| D | E | F |\n'); }
function insertFootnote(){ const n=++fnc,s=ed.selectionStart; ed.setRangeText(`[^${n}]`,s,s,'end'); ed.setRangeText(`\n[^${n}]: Footnote ${n}.\n`,ed.value.length,ed.value.length,'end'); ed.focus(); render(); }
function cpCode(btn){ navigator.clipboard.writeText(btn.nextElementSibling.textContent).then(()=>{ btn.textContent='✓'; setTimeout(()=>btn.textContent='copy',1500); }); }

/* ════ EMOJI ════════════════════════════════════ */
const EMJS='😀😃😄😁😆😅🤣😂🙂😊😇🥰😍🤩😘😚😙🤗🤔🤐😐😑😶😏😒🙄😬🤥😌😔😪🤤😴😷🤒🤕🤢🤮🤧🥵🥶😵🤯🤠🥳😎🤓🧐😕😟🙁☹😮😯😲😳🥺😦😧😨😰😥😢😭😱😖😣😞😓😩😫🤬😡😠🤡👻💀☠👽👾🤖🎃💩❤🧡💛💚💙💜🖤🤍🤎💯✅❌⚡🔥💧⭐🌈🎯🚀💡🔑📚🎵🎮🏆🌍📝🔬⚙🧪⚗🔭📡🛸🤖💻📱⌨🖥🖨🖱📷📸📹🎬🎤🎧🎼🎹🎸🎺🥁🎲♟🧩'.split('');
const emp=document.getElementById('emp');
EMJS.forEach(em=>{
  const btn=document.createElement('button');
  btn.textContent=em;
  btn.style.cssText='background:none;border:none;cursor:pointer;font-size:17px;padding:2px;border-radius:4px;';
  btn.addEventListener('mouseenter',()=>btn.style.background='var(--panel2)');
  btn.addEventListener('mouseleave',()=>btn.style.background='none');
  btn.onclick=()=>{ ins(em); emp.style.display='none'; };
  emp.appendChild(btn);
});
function toggleEmoji(){
  if(emp.style.display==='flex'){emp.style.display='none';return;}
  const r=document.getElementById('ebtn').getBoundingClientRect();

function openFind(){
  const on=document.getElementById('fb').classList.toggle('open');
  document.getElementById('fndtgl').classList.toggle('on',on);
  if(on) setTimeout(()=>document.getElementById('fq').focus(),50);
}
function closeFind(){ document.getElementById('fb').classList.remove('open'); document.getElementById('fndtgl').classList.remove('on'); document.getElementById('fcnt').textContent=''; }
function doFind(){
  const q=document.getElementById('fq').value;
  const cs=document.getElementById('fcs').checked;
  const rx=document.getElementById('frx').checked;
  fms=[]; fmx=0; document.getElementById('fcnt').textContent='';
  if(!q) return;
  let re; try{ re=new RegExp(rx?q:q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),cs?'g':'gi'); }catch(e){return;}
  let m; const txt=ed.value;
  while((m=re.exec(txt))!==null) fms.push({s:m.index,e:m.index+m[0].length});
  document.getElementById('fcnt').textContent=fms.length?`${fmx+1}/${fms.length}`:'No match';
  if(fms.length) hlFind(0);
}
function findNav(d){ if(!fms.length) return; fmx=(fmx+d+fms.length)%fms.length; hlFind(fmx); document.getElementById('fcnt').textContent=`${fmx+1}/${fms.length}`; }
function hlFind(i){ ed.focus(); ed.setSelectionRange(fms[i].s,fms[i].e); }
function doReplace(){ if(!fms.length) return; const r=document.getElementById('rq').value,m=fms[fmx]; ed.setRangeText(r,m.s,m.e,'end'); render(); doFind(); }
function doReplaceAll(){
  const q=document.getElementById('fq').value,r=document.getElementById('rq').value;
  const cs=document.getElementById('fcs').checked,rx=document.getElementById('frx').checked;
  if(!q) return;
  let re; try{ re=new RegExp(rx?q:q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),cs?'g':'gi'); }catch(e){return;}
  const cnt=(ed.value.match(re)||[]).length;
  ed.value=ed.value.replace(re,r);
  render(); doFind(); toast(`Replaced ${cnt} instance(s)`,'ok');
}
document.getElementById('fq').addEventListener('keydown',e=>{ if(e.key==='Enter') findNav(e.shiftKey?-1:1); if(e.key==='Escape') closeFind(); });

/* Convert raw Markdown → clean HTML string safe for html-docx-js */
function buildDocxHTML(markdownText) {
  const renderer = new marked.Renderer();

  // Headings — no anchor IDs needed in docx
  renderer.heading = (text, level) => `<h${level}>${text}</h${level}>\n`;

  // Code blocks — plain text only, no highlight.js spans
  renderer.code = (code, lang) => {
    // Decode HTML entities marked may have introduced
    const decoded = code
      .replace(/&amp;/g, '&').replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>').replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'");

    // Mermaid / diagrams can't render in docx
    if (lang === 'mermaid') {
      return `<p><em>[Mermaid diagram — view in live preview]</em></p>\n`;
    }

    // Re-encode for safe display inside <pre><code>
    const safe = decoded
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<pre><code>${safe}</code></pre>\n`;
  };

  // Tables — explicit border attrs for Word compatibility
  renderer.table = (header, body) =>
    `<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;width:100%;">` +
    `<thead>${header}</thead><tbody>${body}</tbody></table>\n`;

  renderer.tablerow  = content => `<tr>${content}</tr>\n`;
  renderer.tablecell = (content, { header, align }) => {
    const tag   = header ? 'th' : 'td';
    const style = align ? ` style="text-align:${align}"` : '';
    return `<${tag}${style}>${content}</${tag}>`;
  };

  // Parse from raw markdown — no live-DOM cloning
  const bodyHTML = marked.parse(markdownText, {
    renderer,
    gfm: true,
    breaks: false,
    pedantic: false,
    mangle: false,
    headerIds: false,
  });

  return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Document</title>
  <style>${getDocxCSS()}</style>
</head>
<body>${bodyHTML}</body>
</html>`;
}

/* Main export — called by .docx toolbar button */
function exportWord() {
  if (typeof htmlDocx === 'undefined') {
    toast('html-docx-js not loaded — check network', 'err');
    console.error('[DOCX] html-docx-js unavailable');
    return;
  }
  try {
    const markdownText = ed.value;
    if (!markdownText.trim()) { toast('Editor is empty', 'err'); return; }
    toast('Generating DOCX…', 'info');

    // Step 1: Markdown → clean HTML
    const fullHTML = buildDocxHTML(markdownText);

    // Step 2: HTML → DOCX Blob (margins in twips: 1 in = 1440)
    const docxBlob = htmlDocx.asBlob(fullHTML, {
      orientation: 'portrait',
      margins: { top:1440, right:1080, bottom:1440, left:1080, header:720, footer:720, gutter:0 },
    });

    // Step 3: Download
    const filename = fname() + '.docx';
    saveAs(docxBlob, filename);
    toast('✓ ' + filename + ' downloaded', 'ok');
  } catch (err) {
    console.error('[DOCX] Export error:', err);
    toast('DOCX export failed — see console', 'err');
  }
}

/* ════ KEYBOARD SHORTCUTS ═══════════════════════ */
document.addEventListener('keydown',e=>{
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key==='b'){e.preventDefault();wrap('**','**');}
  if(ctrl&&e.key==='i'){e.preventDefault();wrap('*','*');}
  if(ctrl&&e.key==='`'){e.preventDefault();wrap('`','`');}
  if(ctrl&&e.key==='k'){e.preventDefault();insertLink();}
  if(ctrl&&e.key==='f'){e.preventDefault();openFind();}
  if(e.key==='Escape'){ closeFind(); document.querySelectorAll('.ov.open').forEach(o=>o.classList.remove('open')); }
  if(e.key==='Tab'&&document.activeElement===ed){
    e.preventDefault();
    const s=ed.selectionStart;
    ed.setRangeText('  ',s,s,'end');
    render();
  }
});

(function(){
  const db=document.getElementById('divbar');
  const work=document.getElementById('work');
  let dragging=false,startX,startW;
  db.addEventListener('mousedown',e=>{
    dragging=true; startX=e.clientX;
    startW=document.getElementById('ep').offsetWidth;
    db.classList.add('drag'); e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const dx=e.clientX-startX;
    const tw=work.offsetWidth;
    const nw=Math.max(120,Math.min(tw-120,startW+dx));
    document.getElementById('ep').style.flex='none';
    document.getElementById('ep').style.width=nw+'px';
  });
  document.addEventListener('mouseup',()=>{ dragging=false; db.classList.remove('drag'); });
})();
