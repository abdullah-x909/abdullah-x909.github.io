<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queen3 - Markdown to Perfect Word</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #f8f9fa; }
    .container { display: flex; height: 100vh; }
    .editor, .preview { flex: 1; padding: 20px; overflow: auto; border: 1px solid #ddd; }
    .editor { background: #fff; }
    textarea { width: 100%; height: 100%; border: none; outline: none; font-size: 16px; font-family: monospace; resize: none; }
    .preview { background: #fff; }
    .toolbar { padding: 10px; background: #333; color: white; text-align: center; }
    button { margin: 5px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #333; color: white; border-radius: 6px; display: none; }
  </style>
</head>
<body>

<div class="toolbar">
  <h2>Queen3 - AI OCR Markdown → Perfect Word (.docx)</h2>
  <button onclick="exportWord()">Export to .docx (Math Editable + Mermaid as PNG)</button>
  <button onclick="loadDemo()">Load Demo</button>
</div>

<div class="container">
  <div class="editor">
    <textarea id="editor" spellcheck="false" placeholder="Paste your AI-generated Markdown here..."></textarea>
  </div>
  <div class="preview" id="preview"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// Mermaid config
mermaid.initialize({ startOnLoad: false });

// Render function
async function renderPreview() {
  const md = document.getElementById('editor').value;
  let html = marked.parse(md);

  const preview = document.getElementById('preview');
  preview.innerHTML = html;

  // Render KaTeX
  renderMathInElement(preview, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$", right: "$", display: false},
      {left: "\\(", right: "\\)", display: false},
      {left: "\\[", right: "\\]", display: true}
    ],
    throwOnError: false
  });

  // Render Mermaid
  await mermaid.run({ nodes: preview.querySelectorAll('.mermaid') });
}

// Export to Word - MathML (editable) + Mermaid → PNG
async function exportWord() {
  const preview = document.getElementById('preview').cloneNode(true);
  
  // 1. Convert all KaTeX to MathML (for editable equations in Word)
  const katexBlocks = preview.querySelectorAll('.katex');
  for (const katexEl of katexBlocks) {
    const mathMLSpan = katexEl.querySelector('.katex-mathml');
    if (mathMLSpan) {
      const mathML = mathMLSpan.innerHTML;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = mathML;
      // Fix namespace for better Word compatibility
      const mathTag = wrapper.querySelector('math');
      if (mathTag) mathTag.setAttribute('xmlns', 'http://www.w3.org/1998/Math/MathML');
      katexEl.replaceWith(wrapper);
    }
  }

  // 2. Convert all Mermaid diagrams to high-quality PNG
  const mermaidSVGs = preview.querySelectorAll('.mermaid svg');
  for (let i = 0; i < mermaidSVGs.length; i++) {
    const svgContainer = mermaidSVGs[i].parentElement;
    try {
      const pngDataUrl = await htmlToImage.toPng(svgContainer, {
        backgroundColor: '#ffffff',
        pixelRatio: 3,
        quality: 1
      });
      const img = document.createElement('img');
      img.src = pngDataUrl;
      img.style.maxWidth = '100%';
      img.style.height = 'auto';
      img.style.display = 'block';
      img.style.margin = '15px 0';
      svgContainer.replaceWith(img);
    } catch (err) {
      console.warn('Mermaid to PNG failed', err);
    }
  }

  // Build final HTML for export
  const exportHTML = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Queen3 Export</title>
  <style>
    body { font-family: Calibri, Arial, sans-serif; line-height: 1.6; margin: 40px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #000; padding: 8px; text-align: left; }
    img { max-width: 100%; height: auto; display: block; margin: 15px 0; }
    pre { background: #f4f4f4; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  ${preview.innerHTML}
</body>
</html>`;

  try {
    const blob = htmlDocx.asBlob(exportHTML, {
      orientation: 'portrait',
      margins: { top: 720, right: 720, bottom: 720, left: 720 }
    });
    saveAs(blob, 'Queen3_Export_' + new Date().toISOString().slice(0,10) + '.docx');
    showToast('✅ Exported successfully! Math is editable in Word.', 'success');
  } catch (e) {
    showToast('Export failed. Check console.', 'error');
    console.error(e);
  }
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

function loadDemo() {
  document.getElementById('editor').value = `# Queen3 Demo - AI OCR Ready

## LaTeX Math (will be editable in Word)

Einstein's equation: $E = mc^2$

Quadratic formula:
$$
x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}
$$

Maxwell equation:
$$
\\nabla \\cdot \\vec{E} = \\frac{\\rho}{\\varepsilon_0}
$$

## Mermaid Diagram (will become PNG in Word)

\`\`\`mermaid
flowchart TD
    A[AI OCR Input] --> B[Markdown]
    B --> C{Queen3 Tool}
    C --> D[Editable MathML]
    C --> E[Mermaid → PNG]
    D & E --> F[Perfect .docx]
\`\`\`

Paste your real AI-generated content and click **Export to .docx**.`;
  renderPreview();
}

// Event listeners
document.getElementById('editor').addEventListener('input', () => {
  clearTimeout(window.renderTimeout);
  window.renderTimeout = setTimeout(renderPreview, 300);
});

// Initial render
setTimeout(() => {
  loadDemo();
}, 100);
</script>

</body>
</html>
